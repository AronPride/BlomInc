<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Play | BLOM</title>
  <meta name="theme-color" content="#fff6ff" />
  <link rel="stylesheet" href="css/age-gate.css" />
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
      background: #fff6ff;
      color: #3a3638;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    a { color: #6f6a6d; }
    .bar {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.75rem 1rem;
      background: rgba(255,255,255,0.9);
      border-bottom: 1px solid #fce7f3;
    }
    .bar img { height: 2rem; width: auto; }

    .play-shell {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 184px;
      gap: 0;
      min-height: 0;
      height: calc(100vh - 52px);
    }

    .play-viewport {
      display: flex;
      flex-direction: column;
      min-width: 0;
      min-height: 0;
      padding: 0.5rem;
    }

    .play-stage-col {
      display: contents;
    }
    .preview-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 0;
    }
    .preview-frame {
      position: relative;
      height: 100%;
      max-height: 100%;
      aspect-ratio: auto;
      line-height: 0;
    }
    #play-canvas {
      display: block;
      width: 100%;
      height: 100%;
      background: #222;
      border-radius: 4px;
      touch-action: none;
    }
    #play-status {
      flex-shrink: 0;
      margin: 0.35rem 0 0;
      font-size: 0.75rem;
      color: #6f6a6d;
      min-height: 1rem;
      text-align: center;
    }
    .error { color: #b42318; }

    .play-controls-col {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      padding: 0.75rem 0.625rem;
      background: rgba(255,255,255,0.85);
      border-left: 1px solid #fce7f3;
      overflow-y: auto;
      font-size: 0.75rem;
    }
    .play-intro {
      text-align: center;
      padding: 0.25rem 0;
    }
    .play-intro h1 {
      margin: 0 0 0.35rem;
      font-size: 1rem;
    }
    .play-intro p {
      margin: 0;
      color: #9a9598;
      line-height: 1.35;
      font-size: 0.6875rem;
    }
    .btn {
      padding: 0.4rem 0.5rem;
      border: none;
      border-radius: 0.375rem;
      background: #DD6096;
      color: #fff;
      font-size: 0.75rem;
      font-weight: 500;
      cursor: pointer;
      font-family: inherit;
      width: 100%;
    }
    .btn:disabled { opacity: 0.6; cursor: wait; }
    .btn--secondary {
      background: transparent;
      color: #DD6096;
      border: 1px solid #DD6096;
      display: none;
    }
    .btn--secondary.is-visible { display: block; }
    .btn-row {
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
    }
    .preset-row {
      display: none;
      flex-direction: column;
      gap: 0.35rem;
    }
    .preset-row.is-visible { display: flex; }
    .preset-label {
      margin: 0;
      font-size: 0.625rem;
      color: #9a9598;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .preset-btns {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 0.25rem;
    }
    .btn--preset {
      background: #fff;
      color: #DD6096;
      border: 1px solid #DD6096;
      padding: 0.3rem 0.2rem;
      min-width: 0;
      display: none;
      font-size: 0.625rem;
      line-height: 1.2;
    }
    .btn--preset.is-visible { display: block; }
    .btn--preset.is-active {
      background: #DD6096;
      color: #fff;
    }
    .slider-row {
      display: none;
      flex-direction: column;
      gap: 0.15rem;
    }
    .slider-row.is-visible { display: flex; }
    .slider-row label {
      font-size: 0.625rem;
      color: #9a9598;
    }
    .slider-row input[type="range"] {
      width: 100%;
      accent-color: #DD6096;
      cursor: pointer;
      height: 1rem;
    }
    .slider-value {
      font-size: 0.6875rem;
      color: #6f6a6d;
      font-variant-numeric: tabular-nums;
    }
    .face-only-row { gap: 0.2rem; }
    .face-only-label {
      display: flex;
      align-items: flex-start;
      gap: 0.35rem;
      font-size: 0.6875rem;
      color: #6f6a6d;
      cursor: pointer;
      line-height: 1.3;
    }
    .face-only-label input {
      accent-color: #DD6096;
      width: 0.875rem;
      height: 0.875rem;
      margin-top: 0.1rem;
      flex-shrink: 0;
      cursor: pointer;
    }
    .face-only-hint {
      font-size: 0.625rem;
      line-height: 1.3;
      color: #9a9598;
    }

    .capture-modal {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      background: rgba(58, 54, 56, 0.55);
    }
    .capture-modal.is-open { display: flex; }
    .capture-dialog {
      width: min(100%, 22rem);
      max-height: calc(100vh - 2rem);
      overflow-y: auto;
      background: #fff;
      border-radius: 0.5rem;
      padding: 1rem;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.18);
    }
    .capture-dialog h2 {
      margin: 0 0 0.5rem;
      font-size: 1rem;
      font-weight: 600;
    }
    .capture-dialog p {
      margin: 0 0 0.75rem;
      font-size: 0.75rem;
      color: #9a9598;
      line-height: 1.4;
    }
    .capture-preview-wrap {
      position: relative;
      margin-bottom: 0.75rem;
      border-radius: 0.375rem;
      overflow: hidden;
      background: #222;
      line-height: 0;
    }
    .capture-preview-wrap.is-ready { cursor: pointer; }
    .capture-preview-wrap img {
      display: block;
      width: 100%;
      height: auto;
    }
    .capture-actions {
      display: none;
      grid-template-columns: 1fr 1fr;
      gap: 0.35rem;
      margin-top: 0.5rem;
    }
    .capture-actions.is-visible { display: grid; }
    .capture-actions a,
    .capture-actions button {
      padding: 0.45rem 0.35rem;
      border-radius: 0.375rem;
      font-size: 0.6875rem;
      font-weight: 500;
      font-family: inherit;
      text-align: center;
      text-decoration: none;
      cursor: pointer;
      border: none;
    }
    .capture-actions a {
      background: #DD6096;
      color: #fff;
    }
    .capture-actions button {
      background: #fff;
      color: #DD6096;
      border: 1px solid #DD6096;
    }
    .capture-form label {
      display: block;
      font-size: 0.625rem;
      color: #9a9598;
      margin-bottom: 0.2rem;
    }
    .capture-form input[type="email"] {
      width: 100%;
      padding: 0.45rem 0.5rem;
      border: 1px solid #fce7f3;
      border-radius: 0.375rem;
      font-size: 0.8125rem;
      font-family: inherit;
      margin-bottom: 0.5rem;
    }
    .capture-optin {
      display: flex;
      align-items: flex-start;
      gap: 0.35rem;
      font-size: 0.6875rem;
      color: #6f6a6d;
      line-height: 1.3;
      margin-bottom: 0.75rem;
      cursor: pointer;
    }
    .capture-optin input {
      accent-color: #DD6096;
      margin-top: 0.1rem;
      flex-shrink: 0;
    }
    .capture-form-btns {
      display: flex;
      gap: 0.35rem;
    }
    .capture-form-btns .btn { flex: 1; }
    .btn--ghost {
      background: transparent;
      color: #6f6a6d;
      border: 1px solid #e8e4e6;
    }
    .capture-error {
      font-size: 0.6875rem;
      color: #b42318;
      margin: 0 0 0.5rem;
      display: none;
    }
    .capture-error.is-visible { display: block; }

    .play-controls-col.is-idle .live-only { display: none; }

    @media (max-width: 720px) {
      .play-shell {
        grid-template-columns: 1fr 148px;
      }
    }
  </style>
</head>
<body>
  <script src="js/age-gate.js"></script>

  <header class="bar">
    <a href="index.html"><img src="assets/BlomIncNoBG.png" alt="BLOM"></a>
    <span id="play-badge">Play</span>
  </header>

  <main class="play-shell">
    <section class="play-viewport">
      <div id="play-preview" class="preview-wrap">
        <div class="preview-frame">
          <canvas id="play-canvas"></canvas>
        </div>
      </div>
      <p id="play-status">Ready — allow camera to begin.</p>
    </section>

    <aside class="play-controls-col is-idle" id="play-controls">
      <div class="play-intro">
        <h1>Reaction diffusion</h1>
        <p>Camera drives live Gray-Scott patterns on the crescent.</p>
      </div>
      <div class="btn-row">
        <button type="button" id="play-start-btn" class="btn">Allow camera</button>
        <button type="button" id="play-screenshot-btn" class="btn btn--secondary">Screenshot</button>
      </div>
      <div id="play-presets" class="preset-row live-only" aria-label="Camera input modes">
        <p class="preset-label">Camera</p>
        <div class="preset-btns">
          <button type="button" class="btn btn--preset" data-preset="0" title="R + G blend (default)">1</button>
          <button type="button" class="btn btn--preset" data-preset="1" title="Inverted brightness">2</button>
          <button type="button" class="btn btn--preset" data-preset="2" title="Warm skin-weighted">3</button>
          <button type="button" class="btn btn--preset" data-preset="3" title="Color contrast">4</button>
          <button type="button" class="btn btn--preset" data-preset="4" title="Red emphasis">5</button>
          <button type="button" class="btn btn--preset" data-preset="5" title="Color separation">6</button>
        </div>
      </div>
      <div id="play-da-row" class="slider-row live-only">
        <label for="play-da-slider">Pattern Size</label>
        <input type="range" id="play-da-slider" min="0.2" max="1.15" step="0.01" value="0.27" />
        <span id="play-da-value" class="slider-value">0.27</span>
      </div>
      <div id="play-zoom-row" class="slider-row live-only">
        <label for="play-zoom-slider">Zoom</label>
        <input type="range" id="play-zoom-slider" min="1" max="4" step="0.05" value="1.4" />
        <span id="play-zoom-value" class="slider-value">1.40×</span>
      </div>
      <div id="play-detail-row" class="slider-row live-only">
        <label for="play-detail-slider">Intensity</label>
        <input type="range" id="play-detail-slider" min="0.2" max="1.5" step="0.05" value="1.35" />
        <span id="play-detail-value" class="slider-value">1.35</span>
      </div>
      <div id="play-edge-row" class="slider-row live-only">
        <label for="play-edge-slider">Pattern range</label>
        <input type="range" id="play-edge-slider" min="-1" max="1" step="0.05" value="0.15" />
        <span id="play-edge-value" class="slider-value">0.15</span>
      </div>
      <div id="play-face-only-row" class="slider-row face-only-row live-only">
        <label class="face-only-label">
          <input type="checkbox" id="play-face-only" checked />
          Face-only input
        </label>
        <span class="slider-value face-only-hint">Patterns on face; background neutral</span>
      </div>
    </aside>
  </main>

  <div id="play-capture-modal" class="capture-modal" role="dialog" aria-modal="true" aria-labelledby="play-capture-title" hidden>
    <div class="capture-dialog">
      <h2 id="play-capture-title">Save your pattern</h2>
      <p id="play-capture-lead">Enter your email to download or share your creation.</p>
      <div class="capture-preview-wrap">
        <img id="play-capture-preview" alt="Your reaction-diffusion pattern" />
      </div>
      <div id="play-capture-actions" class="capture-actions" aria-label="Share options">
        <a id="play-capture-download" href="#" download="blom-pattern.png">Download</a>
        <button type="button" id="play-capture-instagram">Instagram</button>
      </div>
      <form id="play-capture-form" class="capture-form">
        <p id="play-capture-error" class="capture-error" role="alert"></p>
        <label for="play-capture-email">Email</label>
        <input type="email" id="play-capture-email" name="email" required placeholder="you@example.com" autocomplete="email" />
        <label class="capture-optin">
          <input type="checkbox" id="play-capture-marketing" name="marketing" />
          Send me BLOM updates (optional)
        </label>
        <div class="capture-form-btns">
          <button type="button" id="play-capture-cancel" class="btn btn--ghost">Cancel</button>
          <button type="submit" id="play-capture-submit" class="btn">Continue</button>
        </div>
      </form>
    </div>
  </div>

  <video id="play-video" playsinline muted hidden aria-hidden="true"></video>
  <canvas id="play-cam-canvas" width="640" height="480" hidden aria-hidden="true"></canvas>

  <script src="js/webgl-utils.js?v=17"></script>
  <script src="js/play-face.js?v=19"></script>
  <script src="js/play-simulation.js?v=83"></script>
  <script src="js/play.js?v=33"></script>
</body>
</html>
